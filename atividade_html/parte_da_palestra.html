<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Palestra Tecnologica</title>
</head>

<body>
    <main>
        <form>
            <label for="categorias">Escolha uma categoria:</label>
<select id="categorias" name="categorias" required>
    <option value="" disabled selected>Selecione uma categoria...</option>
    <option value="inteligencia artificial">Inteligência Artificial</option>
    <option value="desenvolvimento mobile">Desenvolvimento Mobile</option>
    <option value="redes">Redes</option>
</select>
        <br><br>
        </form>
  <p>Selecione seu nível técnico:</p>

  <input type="radio" id="iniciante" name="nivel" value="iniciante" required title="Escolha iniciante se você está começando">
  <label for="iniciante">Iniciante</label><br>

  <input type="radio" id="intermediario" name="nivel" value="intermediario" required title="Escolha intermediário se você tem alguma experiência">
  <label for="intermediario">Intermediário</label><br>

  <input type="radio" id="avancado" name="nivel" value="avancado" required title="Escolha avançado se você domina o assunto">
  <label for="avancado">Avançado</label><br>
   <br> 
  <button type="submit">Enviar</button>
  <br><br>
       
    </main>
    <a href="/atividades_de_aula/index.html">Clique aqui para voltar para a pagina principal!</a>
</body>
</html>
